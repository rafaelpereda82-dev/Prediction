<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BVC Master Trader - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid #2a2a2a;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .subtitle {
            color: #808080;
            font-size: 14px;
            margin-top: 4px;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        .refresh-btn:active {
            transform: translateY(0);
        }
        
        .refresh-btn.spinning svg {
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Summary Cards */
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: linear-gradient(135deg, #1a1a1a 0%, #121212 100%);
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .card:hover {
            transform: translateY(-2px);
            border-color: #3a3a3a;
        }
        
        .card-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #808080;
            margin-bottom: 8px;
        }
        
        .card-value {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
        }
        
        .card-change {
            font-size: 14px;
            margin-top: 4px;
            font-weight: 600;
        }
        
        .positive {
            color: #27ae60;
        }
        
        .negative {
            color: #e74c3c;
        }
        
        /* Table Styles */
        .portfolio-section {
            background: #121212;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        
        .section-header {
            padding: 20px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }
        
        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        
        th {
            background-color: #1a1a1a;
            color: #808080;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 11px;
            letter-spacing: 0.5px;
            padding: 16px 12px;
            text-align: center;
            border-bottom: 1px solid #2a2a2a;
        }
        
        td {
            padding: 16px 12px;
            border-bottom: 1px solid #1f1f1f;
            text-align: center;
            color: #e0e0e0;
        }
        
        tr:hover td {
            background-color: #1a1a1a;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        /* Ticker Cell */
        .ticker-cell {
            text-align: left;
            padding-left: 20px;
        }
        
        .ticker-name {
            font-weight: 700;
            color: #ffffff;
            font-size: 14px;
            display: block;
        }
        
        .company-name {
            color: #808080;
            font-size: 11px;
            font-weight: 400;
            display: block;
            margin-top: 2px;
        }
        
        /* Badges */
        .badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 13px;
            display: inline-block;
        }
        
        .badge-green {
            background-color: rgba(39, 174, 96, 0.15);
            color: #27ae60;
        }
        
        .badge-red {
            background-color: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }
        
        .badge-neutral {
            background-color: rgba(128, 128, 128, 0.15);
            color: #808080;
        }
        
        /* Price */
        .price {
            font-weight: 600;
            font-family: 'SF Mono', monospace;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px;
            color: #808080;
        }
        
        .spinner {
            border: 3px solid #2a2a2a;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #808080;
        }
        
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        /* API Status */
        .api-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(39, 174, 96, 0.1);
            border-radius: 20px;
            font-size: 12px;
            color: #27ae60;
        }
        
        .api-status.error {
            background: rgba(231, 76, 60, 0.1);
            color: #e74c3c;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>💼 Mi Portafolio</h1>
                <div class="subtitle">BVC Master Trader - Tiempo Real</div>
            </div>
            <div style="display: flex; align-items: center; gap: 16px;">
                <div id="apiStatus" class="api-status">
                    <span class="status-dot"></span>
                    <span>API Conectada</span>
                </div>
                <button class="refresh-btn" onclick="refreshData()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                    Actualizar
                </button>
            </div>
        </header>
        
        <!-- Summary Cards -->
        <div class="summary-cards" id="summaryCards">
            <div class="card">
                <div class="card-label">Total Invertido</div>
                <div class="card-value" id="totalInvertido">$0.00</div>
            </div>
            <div class="card">
                <div class="card-label">Valor Actual</div>
                <div class="card-value" id="valorActual">$0.00</div>
            </div>
            <div class="card">
                <div class="card-label">Ganancia / Pérdida</div>
                <div class="card-value" id="pnlTotal">$0.00</div>
                <div class="card-change" id="pnlChange">0.00%</div>
            </div>
            <div class="card">
                <div class="card-label">Posiciones Abiertas</div>
                <div class="card-value" id="numPosiciones">0</div>
            </div>
        </div>
        
        <!-- Portfolio Table -->
        <div class="portfolio-section">
            <div class="section-header">
                <div class="section-title">📊 Posiciones</div>
            </div>
            <div class="table-container">
                <table id="portfolioTable">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Cantidad</th>
                            <th>Costo Promedio</th>
                            <th>Precio Actual</th>
                            <th>Inversión</th>
                            <th>Valor Actual</th>
                            <th>G/P $</th>
                            <th>G/P %</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="8" class="loading">
                                <div class="spinner"></div>
                                <div>Cargando datos del portafolio...</div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Company names mapping
        const companyNames = {
            'ABC.A': "BCO. CARIBE 'A'",
            'ALZ.B': "ALZA INVERSIONES",
            'ARC.A': "ARCA INM. Y VAL. 'A'",
            'ARC.B': "ARCA INM.VAL.'B'",
            'BNC': "BCO.NAC.CREDITO",
            'BPV': "BCO. PROVINCIAL",
            'BVCC': "BOLSA Y CC. CCS",
            'BVL': "B. DE VENEZUELA",
            'CCP.B': "CERAMICA CARABOBO",
            'DOM.A': "DOMINGUI",
            'ENV.A': "ENVASES VENEZOLANOS",
            'FNC': "FONDO NACIONAL",
            'FON.A': "FONDOVAL 'A'",
            'FON.B': "FONDOVAL 'B'",
            'FON.C': "FONDOVAL 'C'",
            'FTH.A': "FONDO DE INVERS. TH",
            'GPV': "GRUPO VENEZOLANO",
            'MAN.A': "MANPA",
            'MVZ.A': "MERCANTIL VEN. 'A'",
            'MVZ.B': "MERCANTIL VEN. 'B'",
            'PCP.B': "PROAGRO 'B'",
            'PGV.A': "PROAGRO VAL 'A'",
            'PGV.B': "PROAGRO VAL 'B'",
            'PHC.A': "PHILLIPS CARIBE",
            'SCB.A': "SUDAMERICANO 'A'",
            'SCB.B': "SUDAMERICANO 'B'",
            'SIV.A': "SIDOR 'A'",
            'SIV.B': "SIDOR 'B'",
            'SNI.B': "SINAI 'B'",
            'STG.A': "SANTA TERESA",
            'TPG': "TECNICAS POLLI",
            'VUL.A': "VULCANIZADOS",
        };

        async function fetchPortfolio() {
            try {
                const response = await fetch('/api/portfolio');
                if (!response.ok) throw new Error('API Error');
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Error fetching portfolio:', error);
                document.getElementById('apiStatus').classList.add('error');
                document.getElementById('apiStatus').innerHTML = '<span class="status-dot"></span><span>Error API</span>';
                return null;
            }
        }

        function formatMoney(value) {
            return '$' + value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function getBadge(value) {
            if (value > 0) {
                return `<span class="badge badge-green">+$${value.toFixed(2)}</span>`;
            } else if (value < 0) {
                return `<span class="badge badge-red">-$${Math.abs(value).toFixed(2)}</span>`;
            }
            return `<span class="badge badge-neutral">$0.00</span>`;
        }

        function getBadgePct(value) {
            if (value > 0) {
                return `<span class="badge badge-green">+${value.toFixed(2)}%</span>`;
            } else if (value < 0) {
                return `<span class="badge badge-red">-${Math.abs(value).toFixed(2)}%</span>`;
            }
            return `<span class="badge badge-neutral">0.00%</span>`;
        }

        function updateSummary(resumen) {
            document.getElementById('totalInvertido').textContent = formatMoney(resumen.total_invertido);
            document.getElementById('valorActual').textContent = formatMoney(resumen.total_actual);
            
            const pnlEl = document.getElementById('pnlTotal');
            const pnlChangeEl = document.getElementById('pnlChange');
            
            pnlEl.textContent = (resumen.pnl_total >= 0 ? '+' : '-') + formatMoney(Math.abs(resumen.pnl_total));
            pnlEl.className = 'card-value ' + (resumen.pnl_total >= 0 ? 'positive' : 'negative');
            
            pnlChangeEl.textContent = (resumen.pnl_total >= 0 ? '+' : '-') + Math.abs(resumen.pnl_total_pct).toFixed(2) + '%';
            pnlChangeEl.className = 'card-change ' + (resumen.pnl_total >= 0 ? 'positive' : 'negative');
            
            document.getElementById('numPosiciones').textContent = resumen.num_posiciones;
        }

        function updateTable(posiciones) {
            const tbody = document.getElementById('tableBody');
            
            if (posiciones.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="8" class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                            </svg>
                            <div>No tienes acciones en tu portafolio</div>
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = posiciones.map(pos => `
                <tr>
                    <td class="ticker-cell">
                        <span class="ticker-name">${pos.ticker}</span>
                        <span class="company-name">${companyNames[pos.ticker] || pos.ticker}</span>
                    </td>
                    <td>${pos.cantidad.toLocaleString()}</td>
                    <td class="price">${formatMoney(pos.costo_promedio)}</td>
                    <td class="price">${formatMoney(pos.precio_actual)}</td>
                    <td class="price">${formatMoney(pos.inversion_usd)}</td>
                    <td class="price">${formatMoney(pos.valor_actual_usd)}</td>
                    <td>${getBadge(pos.pnl_usd)}</td>
                    <td>${getBadgePct(pos.pnl_pct)}</td>
                </tr>
            `).join('');
        }

        async function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            btn.classList.add('spinning');
            
            const data = await fetchPortfolio();
            
            if (data) {
                updateSummary(data.resumen);
                updateTable(data.posiciones);
                document.getElementById('apiStatus').classList.remove('error');
                document.getElementById('apiStatus').innerHTML = '<span class="status-dot"></span><span>API Conectada</span>';
            }
            
            setTimeout(() => btn.classList.remove('spinning'), 500);
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshData, 30000);

        // Initial load
        refreshData();
    </script>
</body>
</html>
